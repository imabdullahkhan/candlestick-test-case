version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: candlestick-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: candlestick
      POSTGRES_USER: candlestick
      POSTGRES_PASSWORD: candlestick
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U candlestick -d candlestick"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: candlestick-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
